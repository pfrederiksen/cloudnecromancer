name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install DuckDB dependencies (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o cloudnecromancer ./main.go
          tar czf cloudnecromancer_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz cloudnecromancer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudnecromancer_${{ matrix.goos }}_${{ matrix.goarch }}
          path: cloudnecromancer_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Generate Homebrew formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_AMD64_SHA=$(sha256sum dist/cloudnecromancer_${GITHUB_REF_NAME}_darwin_amd64.tar.gz | awk '{print $1}')
          DARWIN_ARM64_SHA=$(sha256sum dist/cloudnecromancer_${GITHUB_REF_NAME}_darwin_arm64.tar.gz | awk '{print $1}')
          LINUX_AMD64_SHA=$(sha256sum dist/cloudnecromancer_${GITHUB_REF_NAME}_linux_amd64.tar.gz | awk '{print $1}')
          LINUX_ARM64_SHA=$(sha256sum dist/cloudnecromancer_${GITHUB_REF_NAME}_linux_arm64.tar.gz | awk '{print $1}')
          BASE_URL="https://github.com/pfrederiksen/cloudnecromancer/releases/download/${GITHUB_REF_NAME}"

          cat > formula.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file was generated by CloudNecromancer release automation.
          class Cloudnecromancer < Formula
            desc "Reconstruct point-in-time AWS infrastructure snapshots by replaying CloudTrail events"
            homepage "https://github.com/pfrederiksen/cloudnecromancer"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${BASE_URL}/cloudnecromancer_${GITHUB_REF_NAME}_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"

                def install
                  bin.install "cloudnecromancer"
                end
              end
              if Hardware::CPU.arm?
                url "${BASE_URL}/cloudnecromancer_${GITHUB_REF_NAME}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"

                def install
                  bin.install "cloudnecromancer"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${BASE_URL}/cloudnecromancer_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
                def install
                  bin.install "cloudnecromancer"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${BASE_URL}/cloudnecromancer_${GITHUB_REF_NAME}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
                def install
                  bin.install "cloudnecromancer"
                end
              end
            end

            test do
              system "#{bin}/cloudnecromancer", "--quiet", "--help"
            end
          end
          FORMULA

          # Push formula to tap
          git clone https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/pfrederiksen/homebrew-tap.git tap
          cp formula.rb tap/Formula/cloudnecromancer.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cloudnecromancer.rb
          git commit -m "Update cloudnecromancer to ${VERSION}"
          git push
