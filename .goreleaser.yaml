version: 2

builds:
  - main: ./main.go
    binary: cloudnecromancer
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: pfrederiksen
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/pfrederiksen/cloudnecromancer"
    description: "Reconstruct point-in-time AWS infrastructure snapshots by replaying CloudTrail events"
    license: "MIT"
    test: |
      system "#{bin}/cloudnecromancer", "--quiet", "--help"
    install: |
      bin.install "cloudnecromancer"
